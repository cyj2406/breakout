<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INU 벽돌깨기</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        :root { --bg: #f4f7f6; --primary: #5E9EFF; --accent: #FF8A80; --success: #52c41a; --danger: #ff4d4f; --dark: #2c3e50; }
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--dark); height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        #start-screen { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .mascot { width: 100px; height: 100px; border-radius: 50%; overflow: hidden; border: 4px solid #eee; margin-bottom: 20px; }
        .mascot img { width: 100%; height: 100%; object-fit: cover; }
        .btn-start { width: 250px; padding: 15px; border-radius: 12px; background: var(--primary); color: #fff; font-weight: 700; border: none; cursor: pointer; font-size: 1.1rem; }
        #game-container { width: 700px; max-width: 95vw; display: none; flex-direction: column; background: #fff; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid #f0f0f0; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; border-bottom: 1px solid #f0f0f0; }
        .info-group { display: flex; align-items: center; gap: 12px; }
        .stat { font-weight: 900; font-size: 1.1rem; }
        .timer { color: var(--danger); font-family: monospace; }
        .target { color: var(--success); display: flex; align-items: center; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 5px; opacity: 0.6; }
        .canvas-area { position: relative; width: 700px; height: 500px; background: #0c0c14; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; }
        canvas { width: 100%; height: 100%; display: block; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; text-align: center; border-radius: 24px; }
        .count-text { font-size: 8rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(94,158,255,0.5); }
        .footer { padding: 8px; text-align: center; font-size: 0.7rem; color: #95a5a6; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        @media (max-height: 700px), (max-width: 750px) { #game-container { transform: scale(0.85); } }
        @media (max-width: 600px) { #game-container { transform: scale(0.65); } }
        @media (max-width: 450px) { #game-container { transform: scale(0.5); } }
    </style>
</head>
<body>
    <div id="start-screen">
        <div class="mascot"><img src="Mascot.jpg" alt="Mascot"></div>
        <h1 style="margin-bottom: 25px; font-weight: 900; letter-spacing: -1px;">INU 벽돌깨기</h1>
        <div style="margin-bottom: 15px; width: 250px;">
            <input type="text" id="username" placeholder="이름을 입력하세요" style="width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; outline: none; text-align: center; font-weight: 700;">
        </div>
        <button id="start-btn" class="btn-start">게임 시작</button>
        <div style="position: absolute; bottom: 30px; font-size: 0.8rem; color: #ccc;">디자인학부 / 202301910 / 최유정</div>
    </div>
    <div id="game-container">
        <header class="header">
            <div class="info-group"><div class="stat" id="heart-ui">❤️ ❤️ ❤️</div><div style="font-size: 0.6rem; font-weight: 800; opacity: 0.3; text-transform: uppercase;">PLAYER: <span id="name-ui">---</span></div></div>
            <div class="stat timer" id="timer-ui">00:00</div>
            <div class="info-group"><div class="stat target"><div class="dot"></div> TARGET: <span id="target-ui">0/3</span></div><button class="btn-icon" id="pause-toggle">⏸</button><button class="btn-icon" onclick="location.reload()">✕</button></div>
        </header>
        <div class="canvas-area"><canvas id="gameCanvas" width="700" height="500"></canvas><div id="overlay" class="overlay" style="display: none;"><span id="overlay-text" class="count-text">3</span></div></div>
        <footer class="footer">PC: Arrow Keys | Mobile: Touch Drag</footer>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const container = document.getElementById('game-container');
        let bgm = null;
        let isStarted = false, isPaused = false, lives = 3, redHits = 0, time = 0, timerInterval = null, keys = { left: false, right: false };
        let ball = { x: 350, y: 445, dx: 0, dy: 0, radius: 8, speed: 4 };
        let paddle = { x: 300, width: 100, height: 12 };
        let bricks = [], thumbs = [], particles = [];

        function initBricks() {
            bricks = []; let reds = 0;
            const colors = ['#FFDFBA', '#FFFFBA', '#BAFFC9', '#BAE1FF', '#E0BBE4'];
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 8; c++) {
                    let color = colors[Math.floor(Math.random() * colors.length)];
                    const idx = r * 8 + c; const rem = 40 - idx;
                    if (reds < 12 && (Math.random() < (12-reds)/rem || (12-reds) === rem)) { color = '#FF9E9E'; reds++; }
                    bricks.push({ c, r, color, status: 1 });
                }
            }
        }

        function createParticles(x, y) {
            const colors = ['#FF9E9E', '#BAFFC9', '#BAE1FF', '#E0BBE4', '#FFFFBA'];
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2; const speed = Math.random() * 4 + 2;
                particles.push({ x, y, dx: Math.cos(angle)*speed, dy: Math.sin(angle)*speed, color: colors[Math.floor(Math.random()*colors.length)], life: 1.0 });
            }
        }

        function playBeep(f=440) {
            try { const a = new(window.AudioContext||window.webkitAudioContext)(); const o = a.createOscillator(); const g = a.createGain(); o.connect(g); g.connect(a.destination); o.frequency.value = f; g.gain.value = 0.01; o.start(); o.stop(a.currentTime+0.05); } catch(e){}
        }

        function startBGM() {
            if(!bgm) { bgm = new Audio('Hyper_Speed_Run.mp3'); bgm.volume = 0.3; bgm.loop = true; }
            bgm.play().catch(e => console.log("BGM error:", e));
        }

        function draw() {
            ctx.clearRect(0, 0, 700, 500);
            if (!isStarted) { ball.x = paddle.x + paddle.width/2; ball.y = 445; }
            else if (!isPaused) update();

            bricks.forEach(b => { if (b.status) {
                const bx = 42 + b.c * 78; const by = 60 + b.r * 28;
                ctx.beginPath(); ctx.roundRect(bx, by, 70, 20, 5); ctx.fillStyle = b.color; ctx.fill();
                if(isStarted && ball.x > bx && ball.x < bx + 70 && ball.y > by && ball.y < by + 20) {
                    ball.dy = -ball.dy; b.status = 0; thumbs.push({ x: bx + 35, y: by, o: 1 }); playBeep(500);
                    if (b.color === '#FF9E9E') { redHits++; document.getElementById('target-ui').innerText = redHits+"/3"; if(redHits>=3) win(); }
                }
            }});

            if (keys.left) paddle.x = Math.max(0, paddle.x - 5);
            if (keys.right) paddle.x = Math.min(700 - paddle.width, paddle.x + 5);

            ctx.beginPath(); const grad = ctx.createLinearGradient(paddle.x, 445, paddle.x, 457); grad.addColorStop(0, '#8EBFFF'); grad.addColorStop(1, '#5E9EFF'); ctx.roundRect(paddle.x, 445, paddle.width, paddle.height, 6); ctx.fillStyle = grad; ctx.fill();
            if (redHits < 3) { ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2); ctx.fillStyle = 'white'; ctx.shadowBlur = 10; ctx.shadowColor = 'white'; ctx.fill(); ctx.shadowBlur = 0; }

            thumbs.forEach((t, i) => { ctx.globalAlpha = t.o; ctx.font = '20px serif'; ctx.fillText('👍', t.x - 10, t.y); t.y -= 1.2; t.o -= 0.02; if (t.o <= 0) thumbs.splice(i, 1); });
            particles.forEach((p, i) => { ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fill(); p.x += p.dx; p.y += p.dy; p.life -= 0.02; if(p.life <= 0) particles.splice(i, 1); });
            ctx.globalAlpha = 1;

            if (redHits >= 3 && Math.random() < 0.05) createParticles(Math.random()*700, Math.random()*500);
            requestAnimationFrame(draw);
        }

        function update() {
            ball.x += ball.dx; ball.y += ball.dy;
            if (ball.x < ball.radius || ball.x > 700 - ball.radius) { ball.dx = -ball.dx; playBeep(300); }
            if (ball.y < ball.radius) { ball.dy = -ball.dy; playBeep(300); }
            if (ball.y > 445 - ball.radius && ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                ball.dy = -Math.abs(ball.dy); const hit = (ball.x - (paddle.x + paddle.width/2)) / (paddle.width/2); ball.dx = hit * 4;
                const mag = Math.sqrt(ball.dx**2 + ball.dy**2); ball.dx = (ball.dx/mag)*4; ball.dy = (ball.dy/mag)*4; playBeep(440);
            }
            if (ball.y > 500) { lives--; document.getElementById('heart-ui').innerText = "❤️ ".repeat(lives) + "🖤 ".repeat(3-lives); if (lives <= 0) fail(); else startCountdown(1); }
        }

        function win() { isStarted = false; showOverlay("SUCCESS", "var(--success)"); createParticles(ball.x, ball.y); }
        function fail() { isStarted = false; showOverlay("FAILED", "var(--danger)"); bgm.pause(); }
        function showOverlay(t, c) {
            const ov = document.getElementById('overlay'); const ot = document.getElementById('overlay-text');
            ov.style.display = 'flex'; ov.style.background = 'rgba(0,0,0,0.85)'; ot.style.fontSize = '4rem'; ot.innerText = t; ot.style.color = c;
            if(!document.getElementById('rb')) { const b = document.createElement('button'); b.id = 'rb'; b.className = 'btn-start'; b.innerText = 'RETRY'; b.style.marginTop = '20px'; b.onclick = () => location.reload(); ov.appendChild(b); }
        }

        function startCountdown(sec = 3) {
            isStarted = false; const ov = document.getElementById('overlay'); const ot = document.getElementById('overlay-text');
            ov.style.display = 'flex'; ov.style.background = 'rgba(0,0,0,0.1)'; ot.style.fontSize = '8rem'; ot.style.color = '#fff'; let c = sec; ot.innerText = c;
            startBGM(); 
            const i = setInterval(() => { c--; if (c > 0) ot.innerText = c; else { clearInterval(i); ov.style.display = 'none'; isStarted = true; ball.dx = 0; ball.dy = -4; } }, 1000);
        }

        startBtn.onclick = () => { document.getElementById('name-ui').innerText = document.getElementById('username').value || "PLAYER"; document.getElementById('start-screen').style.display = 'none'; container.style.display = 'flex'; initBricks(); startCountdown(3); timerInterval = setInterval(() => { if(isStarted && !isPaused) time++; const m = String(Math.floor(time/60)).padStart(2,'0'); const s = String(time%60).padStart(2,'0'); document.getElementById('timer-ui').innerText = m+":"+s; }, 1000); draw(); };
        window.onkeydown = (e) => { if (e.key === 'ArrowLeft') keys.left = true; if (e.key === 'ArrowRight') keys.right = true; };
        window.onkeyup = (e) => { if (e.key === 'ArrowLeft') keys.left = false; if (e.key === 'ArrowRight') keys.right = false; };
        canvas.ontouchmove = (e) => { const rx = (e.touches[0].clientX - canvas.getBoundingClientRect().left) * (700 / canvas.getBoundingClientRect().width); paddle.x = Math.max(0, Math.min(700 - paddle.width, rx - paddle.width / 2)); };
        document.getElementById('pause-toggle').onclick = () => { isPaused = !isPaused; document.getElementById('pause-toggle').innerText = isPaused ? "▶" : "⏸"; };
    </script>
</body>
</html>
